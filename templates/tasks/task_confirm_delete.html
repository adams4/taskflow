{% extends "base.html" %}

{% block title %}Confirmer suppression{% endblock %}

{% block content %}
<h1 class="mb-4">Supprimer la tâche ?</h1>
<p>Êtes-vous sûr de vouloir supprimer "{{ object.title }}" ? Cette action est irréversible.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Oui, supprimer</button>
    <a href="{% url 'task_list' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
